<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Facilitador de Chamados</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --accent-color: #28a745;
            --accent-hover: #218838;
            --tab-inactive: #e9ecef;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #444444;
            --primary-color: #375a7f;
            --primary-hover: #2b4764;
            --accent-color: #4bbf73;
            --accent-hover: #3ca360;
            --tab-inactive: #2d2d2d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
        }

        /* Botão Dark Mode */
        .theme-toggle {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: var(--primary-color);
            color: #fff;
        }

        /* Estrutura das Abas */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            background-color: var(--tab-inactive);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-bottom: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 5px;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--card-bg);
            border-bottom: 2px solid var(--card-bg);
            margin-bottom: -1px;
            color: var(--primary-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Formulários */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group.row-inputs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--card-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Ações */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s;
            color: #ffffff;
        }

        .btn-copy {
            background-color: var(--primary-color);
        }
        .btn-copy:hover {
            background-color: var(--primary-hover);
        }

        .btn-download {
            background-color: var(--accent-color);
        }
        .btn-download:hover {
            background-color: var(--accent-hover);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Facilitador de Chamados</h1>
        <button class="theme-toggle" id="themeToggle">Modo Escuro</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'registroCarga')">Registro de Carga</button>
        <button class="tab-btn" onclick="openTab(event, 'tentativaContato')">Tentativa de Contato</button>
        <button class="tab-btn" onclick="openTab(event, 'registroAtendimento')">Registro de Atendimento</button>
        <button class="tab-btn" onclick="openTab(event, 'atendimentoCaixa')">Atendimento Caixa</button>
    </div>

    <div id="registroCarga" class="tab-content active">
        <form id="formCarga">
            <div class="form-group">
                <label>Loja:</label>
                <input type="text" name="Loja" placeholder="Ex: Loja 05">
            </div>
            <div class="form-group">
                <label>Contato:</label>
                <input type="text" name="Contato" placeholder="Nome do funcionário">
            </div>
            <div class="form-group">
                <label>Balança:</label>
                <input type="text" name="Balança" placeholder="Ex: Filizola, Toledo, Toledo TI5">
            </div>
            <div class="form-group">
                <label>Motivo da Carga:</label>
                <textarea name="Motivo da Carga" placeholder="Descreva o motivo..."></textarea>
            </div>
        </form>
        <div class="actions">
            <button class="btn btn-copy" onclick="copyToClipboard('formCarga')">Copiar Informações</button>
            <button class="btn btn-download" onclick="downloadTxt('formCarga', 'Registro_Carga')">Baixar TXT</button>
        </div>
    </div>

    <div id="tentativaContato" class="tab-content">
        <form id="formContato">
            <div class="form-group">
                <label>Chamado:</label>
                <input type="text" name="Chamado" placeholder="Número do chamado">
            </div>
            <label>Ramais Discados:</label>
            <div class="form-group row-inputs">
                <input type="text" name="Ramal 1" placeholder="Ramal 1">
                <input type="text" name="Ramal 2" placeholder="Ramal 2">
                <input type="text" name="Ramal 3" placeholder="Ramal 3">
                <input type="text" name="Ramal 4" placeholder="Ramal 4">
            </div>
        </form>
        <div class="actions">
            <button class="btn btn-copy" onclick="copyToClipboard('formContato')">Copiar Informações</button>
            <button class="btn btn-download" onclick="downloadTxt('formContato', 'Tentativa_Contato')">Baixar TXT</button>
        </div>
    </div>

    <div id="registroAtendimento" class="tab-content">
        <form id="formAtendimento">
            <div class="form-group">
                <label>Solicitante:</label>
                <input type="text" name="Solicitante" placeholder="Quem solicitou">
            </div>
            <div class="form-group">
                <label>Loja/Setor:</label>
                <input type="text" name="Loja_Setor" placeholder="Ex: Loja 10 / Faturamento">
            </div>
            <div class="form-group">
                <label>Categoria:</label>
                <select name="Categoria" id="categoriaSelect" onchange="toggleEquipamentoField()">
                    <option value="Sistema">Sistema</option>
                    <option value="Equipamento">Equipamento</option>
                </select>
            </div>
            <div class="form-group hidden" id="equipamentoGroup">
                <label>Equipamento do PDV:</label>
                <select name="Equipamento PDV">
                    <option value="">-- Selecione o Equipamento --</option>
                    <option value="Impressora">Impressora Fiscal / Não Fiscal</option>
                    <option value="Scanner / Leitor de Código">Scanner / Leitor de Código</option>
                    <option value="Scanner de mão">SAT / MFE</option>
                    <option value="Teclado">Teclado Reduzido Gertec</option>
                    <option value="Monitor">Monitor / Display Cliente</option>
                    <option value="Pinpad / TEF">Pinpad / TEF</option>
                    <option value="CPU do Caixa">CPU do Caixa</option>
                    <option value="Balança">Nobreak</option>
                    <option value="Balança de conferencia">Nobreak</option>
                    <option value="Gaveta de Dinheiro">Gaveta de Dinheiro</option>
                </select>
            </div>
            <div class="form-group">
                <label>Problema Informado:</label>
                <textarea name="Problema Informado" placeholder="O que está acontecendo?"></textarea>
            </div>
            <div class="form-group">
                <label>Procedimento Executado:</label>
                <textarea name="Procedimento Executado" placeholder="Quais testes ou correções foram feitos?"></textarea>
            </div>
        </form>
        <div class="actions">
            <button class="btn btn-copy" onclick="copyToClipboard('formAtendimento')">Copiar Informações</button>
            <button class="btn btn-download" onclick="downloadTxt('formAtendimento', 'Registro_Atendimento')">Baixar TXT</button>
        </div>
    </div>

    <div id="atendimentoCaixa" class="tab-content">
        <form id="formCaixa">
            <div class="form-group">
                <label>Loja:</label>
                <input type="text" name="Loja" placeholder="Ex: Loja 02">
            </div>
            <div class="form-group">
                <label>Caixa:</label>
                <input type="text" name="Caixa" placeholder="Ex: PDV 04">
            </div>
            <div class="form-group">
                <label>Problema:</label>
                <textarea name="Problema" placeholder="Problema apresentado no caixa..."></textarea>
            </div>
            <div class="form-group">
                <label>Solicitante:</label>
                <input type="text" name="Solicitante" placeholder="Nome do operador ou fiscal">
            </div>
        </form>
        <div class="actions">
            <button class="btn btn-copy" onclick="copyToClipboard('formCaixa')">Copiar Informações</button>
            <button class="btn btn-download" onclick="downloadTxt('formCaixa', 'Atendimento_Caixa')">Baixar TXT</button>
        </div>
    </div>
</div>

<script>
    // Gerenciador de Abas
    function openTab(evt, tabId) {
        const tabcontents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < tabcontents.length; i++) {
            tabcontents[i].classList.remove("active");
        }

        const tablinks = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }

        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // Exibir campo de equipamentos se categoria for Equipamento
    function toggleEquipamentoField() {
        const categoria = document.getElementById("categoriaSelect").value;
        const equipGroup = document.getElementById("equipamentoGroup");
        if (categoria === "Equipamento") {
            equipGroup.classList.remove("hidden");
        } else {
            equipGroup.classList.add("hidden");
            equipGroup.querySelector('select').value = ""; // Limpa a seleção se mudar de aba
        }
    }

    // Alternar Modo Escuro
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            document.documentElement.removeAttribute('data-theme');
            themeToggle.textContent = 'Modo Escuro';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.textContent = 'Modo Claro';
        }
    });

    // Função auxiliar para gerar a string formatada do formulário
    function formatFormData(formId) {
        const form = document.getElementById(formId);
        const formData = new FormData(form);
        let textResult = "";
        let ramais = [];

        for (let [key, value] of formData.entries()) {
            // Ignorar campos vazios de Equipamento se não for selecionado
            if (key === "Equipamento PDV" && !value) continue;
            
            // Agrupar ramais na mesma linha para ficar mais limpo
            if (key.startsWith("Ramal")) {
                if (value.trim() !== "") ramais.push(value.trim());
                continue;
            }

            textResult += `${key.replace('_', '/')}: ${value}\n`;
        }

        if (ramais.length > 0) {
            textResult += `Ramais Tentados: ${ramais.join(' | ')}\n`;
        }

        return textResult.trim();
    }

    // Função Copiar
    function copyToClipboard(formId) {
        const text = formatFormData(formId);
        if (!text) {
            alert("Preencha algum campo antes de copiar!");
            return;
        }

        navigator.clipboard.writeText(text).then(() => {
            alert("Informações copiadas com sucesso!");
        }).catch(err => {
            console.error('Erro ao copiar: ', err);
        });
    }

    // Função Baixar TXT
    function downloadTxt(formId, filename) {
        const text = formatFormData(formId);
        if (!text) {
            alert("Preencha algum campo antes de baixar!");
            return;
        }

        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${filename}_${new Date().toISOString().slice(0,10)}.txt`;
        link.link = "Click to download";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
