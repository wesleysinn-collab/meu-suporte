<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Suporte TI - IA Ativada</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        
        .nav-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn {
            padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;
            background: #dcdde1; font-weight: bold; transition: 0.3s; font-size: 13px;
        }
        .nav-btn.active { background: var(--accent); color: white; }

        .form-content { display: none; animation: fadeIn 0.4s; }
        .form-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .container { 
            background: #fff; padding: 25px; border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; 
            max-width: 600px; margin: 0 auto; box-sizing: border-box;
        }

        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        
        input, select, textarea { 
            width: 100%; padding: 10px; border: 1px solid #ddd; 
            border-radius: 4px; box-sizing: border-box; font-family: inherit;
        }

        textarea { height: 100px; resize: vertical; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        button.action-btn { 
            padding: 12px; border: none; border-radius: 4px; cursor: pointer; 
            font-weight: bold; color: white; transition: 0.2s;
        }

        .btn-copy { background: var(--accent); }
        .btn-export { background: var(--success); }
        .btn-clear { background: var(--danger); grid-column: span 2; }
        
        .btn-ia { 
            background: var(--warning); color: white; border: none; 
            padding: 5px 12px; border-radius: 4px; cursor: pointer; 
            font-size: 12px; font-weight: bold; transition: 0.3s;
        }
        .btn-ia:hover { background: #e67e22; transform: scale(1.02); }
        .btn-ia:disabled { background: #ccc; cursor: not-allowed; }
        
        .status-msg { text-align: center; font-size: 0.9em; margin-top: 10px; height: 20px; font-weight: bold; }
        #equipment-fields { display: none; background: #f9f9f9; padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px dashed #ccc; }
    </style>
</head>
<body>

<div class="nav-container">
    <button class="nav-btn active" onclick="switchForm('balanca', this)">Carga Balança</button>
    <button class="nav-btn" onclick="switchForm('mask2', this)">Tentativa de contato</button>
    <button class="nav-btn" onclick="switchForm('mask3', this)">Registro de atendimento</button>
    <button class="nav-btn" onclick="switchForm('mask4', this)">Atendimento de Caixa</button>
</div>

<div id="balanca" class="form-content active">
    <div class="container">
        <h2>Registro de Carga</h2>
        <form id="formBalanca">
            <div class="form-group"><label>Loja:</label><input type="text" id="loja_bal"></div>
            <div class="form-group"><label>Contato:</label><input type="text" id="contato_bal"></div>
            <div class="form-group"><label>Balança:</label><input type="text" id="balanca_id"></div>
            <div class="form-group"><label>Motivo:</label><textarea id="motivo_bal"></textarea></div>
            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarBalanca('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarBalanca('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('formBalanca')">Limpar</button>
            </div>
            <div id="status-balanca" class="status-msg"></div>
        </form>
    </div>
</div>

<div id="mask2" class="form-content">
    <div class="container">
        <h2>Registro de Contato</h2>
        <form id="form2">
            <div class="form-group"><label>Número do Chamado:</label><input type="text" id="chamado_cont"></div>
            <div class="form-group"><label>Ramais Utilizados:</label>
                <div class="grid-2">
                    <input type="text" id="ram1" placeholder="R1"><input type="text" id="ram2" placeholder="R2">
                    <input type="text" id="ram3" placeholder="R3"><input type="text" id="ram4" placeholder="R4">
                </div>
            </div>
            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarContato('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarContato('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('form2')">Limpar</button>
            </div>
            <div id="status-contato" class="status-msg"></div>
        </form>
    </div>
</div>

<div id="mask3" class="form-content">
    <div class="container">
        <h2>Registro de Atendimento</h2>
        <form id="registroForm">
            <div class="form-group"><label>Data:</label><input type="text" id="dataAtend" readonly style="background:#eee"></div>
            <div class="grid-2"><input type="text" id="nome_atend" placeholder="Solicitante"><input type="text" id="loja_atend" placeholder="Loja"></div>
            <div class="form-group" style="margin-top:10px">
                <label>Categoria:</label>
                <select id="cat_atend" onchange="toggleEquip()">
                    <option value="Sistema">Sistema</option>
                    <option value="Equipamento">Equipamento</option>
                </select>
            </div>
            <div id="equipment-fields"><div class="grid-2"><input type="text" id="eq_nome" placeholder="Equip."><input type="text" id="eq_pat" placeholder="Patrimônio"></div></div>
            <div class="form-group"><label>Problema:</label><textarea id="atend_prob"></textarea></div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <label style="margin:0">Procedimento:</label>
                    <button type="button" class="btn-ia" id="btn_ia_atend" onclick="melhorarComGemini('atend_proc', 'btn_ia_atend')">✨ IA Melhorar</button>
                </div>
                <textarea id="atend_proc"></textarea>
            </div>
            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarAtendimento('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarAtendimento('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('registroForm')">Limpar</button>
            </div>
            <div id="status-atend" class="status-msg"></div>
        </form>
    </div>
</div>

<div id="mask4" class="form-content">
    <div class="container">
        <h2>Atendimento de Caixa</h2>
        <form id="formCaixa">
            <div class="grid-2"><input type="text" id="sol_cx" placeholder="Solicitante"><input type="text" id="loja_cx" placeholder="Loja"></div>
            <div class="grid-2" style="margin-top:10px"><input type="text" id="tel_cx" placeholder="Telefone"><input type="text" id="num_cx" placeholder="Caixa Nº"></div>
            <div class="form-group" style="margin-top:10px"><label>Problema:</label><textarea id="prob_cx"></textarea></div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <label style="margin:0">Procedimento:</label>
                    <button type="button" class="btn-ia" id="btn_ia_cx" onclick="melhorarComGemini('proc_cx', 'btn_ia_cx')">✨ IA Melhorar</button>
                </div>
                <textarea id="proc_cx"></textarea>
            </div>
            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarCaixa('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarCaixa('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('formCaixa')">Limpar</button>
            </div>
            <div id="status-caixa" class="status-msg"></div>
        </form>
    </div>
</div>

<script>
    const CHAVE_GEMINI = "AIzaSyAHbofUJnIlvLFZvP0eim68LX_57Zns8IA";

    // NAVEGAÇÃO
    function switchForm(id, btn) {
        document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'mask3') document.getElementById('dataAtend').value = new Date().toLocaleString();
    }

    function showStatus(id, msg, isError = false) {
        const el = document.getElementById(id);
        el.innerText = msg;
        el.style.color = isError ? "var(--danger)" : "var(--success)";
        setTimeout(() => el.innerText = '', 3000);
    }

    function limpar(id) {
        if(confirm("Limpar?")) document.getElementById(id).reset();
    }

    function downloadTxt(nome, texto) {
        const blob = new Blob([texto], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = nome; a.click();
    }

    // LÓGICA DAS MÁSCARAS
    function processarBalanca(acao) {
        const t = `--- CARGA BALANÇA ---\nLOJA: ${document.getElementById('loja_bal').value}\nCONTATO: ${document.getElementById('contato_bal').value}\nMOTIVO: ${document.getElementById('motivo_bal').value}`;
        acao === 'copy' ? navigator.clipboard.writeText(t) : downloadTxt('carga.txt', t);
        showStatus('status-balanca', 'Sucesso!');
    }

    function processarContato(acao) {
        const r = [1,2,3,4].map(i => document.getElementById('ram'+i).value.trim()).filter(x => x).join(", ");
        const t = `--- TENTATIVA DE CONTATO ---\nCHAMADO: ${document.getElementById('chamado_cont').value}\nRAMAIS: ${r}\nSTATUS: Sem êxito.`;
        acao === 'copy' ? navigator.clipboard.writeText(t) : downloadTxt('contato.txt', t);
        showStatus('status-contato', 'Sucesso!');
    }

    function processarAtendimento(acao) {
        const t = `==================================\nPROBLEMA: ${document.getElementById('atend_prob').value}\n\nPROCEDIMENTO: ${document.getElementById('atend_proc').value}\n==================================\nSOLICITANTE: ${document.getElementById('nome_atend').value}\nLOJA: ${document.getElementById('loja_atend').value}\n==================================`;
        acao === 'copy' ? navigator.clipboard.writeText(t) : downloadTxt('atend.txt', t);
        showStatus('status-atend', 'Sucesso!');
    }

    function processarCaixa(acao) {
        const t = `==================================\nPROBLEMA: ${document.getElementById('prob_cx').value}\n\nPROCEDIMENTO: ${document.getElementById('proc_cx').value}\n==================================\nLOJA: ${document.getElementById('loja_cx').value} | CAIXA: ${document.getElementById('num_cx').value}\n==================================`;
        acao === 'copy' ? navigator.clipboard.writeText(t) : downloadTxt('caixa.txt', t);
        showStatus('status-caixa', 'Sucesso!');
    }

    function toggleEquip() {
        document.getElementById('equipment-fields').style.display = document.getElementById('cat_atend').value === 'Equipamento' ? 'block' : 'none';
    }

    // LÓGICA DA IA GEMINI
    async function melhorarComGemini(campoId, btnId) {
        const campo = document.getElementById(campoId);
        const btn = document.getElementById(btnId);
        const statusId = campoId === 'atend_proc' ? 'status-atend' : 'status-caixa';
        const texto = campo.value.trim();

        if(!texto) return alert("Escreva algo primeiro!");

        btn.disabled = true;
        btn.innerText = "⏳ Analisando...";
        showStatus(statusId, "IA processando...");

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CHAVE_GEMINI}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Reescreva o seguinte procedimento de suporte de TI de forma técnica, profissional e objetiva, corrigindo a gramática e termos: ${texto}` }] }]
                })
            });

            const data = await resp.json();
            const resultado = data.candidates[0].content.parts[0].text;
            campo.value = resultado.trim();
            showStatus(statusId, "✅ Texto Refinado!");
        } catch (e) {
            console.error(e);
            showStatus(statusId, "❌ Erro na IA", true);
        } finally {
            btn.disabled = false;
            btn.innerText = "✨ IA Melhorar";
        }
    }

    window.onload = () => { document.getElementById('dataAtend').value = new Date().toLocaleString(); };
</script>
</body>
</html>
