<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Suporte TI - Oficial com IA</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        
        .nav-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn {
            padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;
            background: #dcdde1; font-weight: bold; transition: 0.3s; font-size: 13px;
        }
        .nav-btn.active { background: var(--accent); color: white; }

        .form-content { display: none; animation: fadeIn 0.4s; }
        .form-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .container { 
            background: #fff; padding: 25px; border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; 
            max-width: 600px; margin: 0 auto; box-sizing: border-box;
        }

        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        
        input, select, textarea { 
            width: 100%; padding: 10px; border: 1px solid #ddd; 
            border-radius: 4px; box-sizing: border-box; font-family: inherit;
        }

        textarea { height: 80px; resize: vertical; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        button.action-btn { 
            padding: 12px; border: none; border-radius: 4px; cursor: pointer; 
            font-weight: bold; color: white; transition: 0.2s;
        }

        .btn-copy { background: var(--accent); }
        .btn-export { background: var(--success); }
        .btn-clear { background: var(--danger); grid-column: span 2; }
        .btn-ia { 
            background: var(--warning); color: white; border: none; 
            padding: 4px 8px; border-radius: 4px; cursor: pointer; 
            font-size: 11px; font-weight: bold; 
        }
        
        .status-msg { text-align: center; font-size: 0.9em; margin-top: 10px; height: 20px; color: var(--success); font-weight: bold; }
        #equipment-fields { display: none; background: #f9f9f9; padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px dashed #ccc; }
        
        /* Estilo da Configuração da IA */
        .config-ia {
            max-width: 600px; margin: 20px auto; padding: 15px; 
            background: #eee; border-radius: 8px; font-size: 12px;
        }
    </style>
</head>
<body>

<div class="nav-container">
    <button class="nav-btn active" onclick="switchForm('balanca', this)">Carga Balança</button>
    <button class="nav-btn" onclick="switchForm('mask2', this)">Tentativa de contato</button>
    <button class="nav-btn" onclick="switchForm('mask3', this)">Registro de atendimento</button>
    <button class="nav-btn" onclick="switchForm('mask4', this)">Atendimento de Caixa</button>
</div>

<div id="balanca" class="form-content active">
    <div class="container">
        <h2>Registro de Carga</h2>
        <form id="formBalanca">
            <div class="form-group"><label>Loja:</label><input type="text" id="loja_bal"></div>
            <div class="form-group"><label>Contato:</label><input type="text" id="contato_bal"></div>
            <div class="form-group"><label>Balança:</label><input type="text" id="balanca_id"></div>
            <div class="form-group"><label>Motivo:</label><textarea id="motivo_bal"></textarea></div>
            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarBalanca('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarBalanca('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('formBalanca')">Limpar</button>
            </div>
            <div id="status-balanca" class="status-msg"></div>
        </form>
    </div>
</div>

<div id="mask2" class="form-content">
    <div class="container">
        <h2>Registro de Contato</h2>
        <form id="form2">
            <div class="form-group"><label>Chamado:</label><input type="text" id="chamado_cont"></div>
            <div class="form-group"><label>Ramais:</label><div class="grid-2"><input type="text" id="ram1"><input type="text" id="ram2"><input type="text" id="ram3"><input type="text" id="ram4"></div></div>
            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarContato('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarContato('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('form2')">Limpar</button>
            </div>
            <div id="status-contato" class="status-msg"></div>
        </form>
    </div>
</div>

<div id="mask3" class="form-content">
    <div class="container">
        <h2>Registro de Atendimento</h2>
        <form id="registroForm">
            <div class="form-group"><label>Solicitante:</label><input type="text" id="nome_atend"></div>
            <div class="form-group"><label>Loja/Setor:</label><input type="text" id="loja_atend"></div>
            <div class="form-group"><label>Categoria:</label><select id="cat_atend" onchange="toggleEquip()"><option value="Sistema">Sistema</option><option value="Equipamento">Equipamento</option></select></div>
            <div id="equipment-fields"><input type="text" id="eq_nome" placeholder="Equipamento"><input type="text" id="eq_pat" placeholder="Patrimônio"></div>
            <div class="form-group"><label>Problema:</label><textarea id="atend_prob"></textarea></div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <label style="margin-bottom: 0;">Procedimento Realizado:</label>
                    <button type="button" class="btn-ia" onclick="melhorarTextoIA('atend_proc')">✨ Melhorar com IA</button>
                </div>
                <textarea id="atend_proc" placeholder="Descreva o que foi feito..."></textarea>
            </div>

            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarAtendimento('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarAtendimento('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('registroForm')">Limpar</button>
            </div>
            <div id="status-atend" class="status-msg"></div>
        </form>
    </div>
</div>

<div id="mask4" class="form-content">
    <div class="container">
        <h2>Atendimento de Caixa</h2>
        <form id="formCaixa">
            <div class="grid-2"><div class="form-group"><label>Loja:</label><input type="text" id="loja_cx"></div><div class="form-group"><label>Caixa:</label><input type="text" id="num_cx"></div></div>
            <div class="form-group"><label>Problema:</label><textarea id="prob_cx"></textarea></div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <label style="margin-bottom: 0;">Procedimento Executado:</label>
                    <button type="button" class="btn-ia" onclick="melhorarTextoIA('proc_cx')">✨ Melhorar com IA</button>
                </div>
                <textarea id="proc_cx" placeholder="Descreva a solução..."></textarea>
            </div>

            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarCaixa('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarCaixa('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('formCaixa')">Limpar</button>
            </div>
            <div id="status-caixa" class="status-msg"></div>
        </form>
    </div>
</div>

<div class="config-ia">
    <strong>Configuração da IA:</strong><br>
    <input type="password" id="hf_token" placeholder="Cole seu Token do Hugging Face aqui" style="margin-top: 5px; font-size: 11px;">
    <p style="margin-top: 5px; color: #666;">O Token fica salvo localmente no seu navegador.</p>
</div>

<script>
    // ---------------- LÓGICA DE NAVEGAÇÃO E LIMPEZA ----------------
    function switchForm(id, btn) {
        document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function limpar(id) {
        if(confirm("Limpar campos?")) document.getElementById(id).reset();
    }

    function showStatus(id, msg) {
        const el = document.getElementById(id);
        el.innerText = msg;
        setTimeout(() => el.innerText = '', 3000);
    }

    function downloadTxt(nome, texto) {
        const blob = new Blob([texto], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = nome; link.click();
    }

    // ---------------- LÓGICA DAS MÁSCARAS ----------------
    function processarBalanca(acao) {
        const texto = `--- CARGA BALANÇA ---\nLOJA: ${document.getElementById('loja_bal').value}\nMOTIVO: ${document.getElementById('motivo_bal').value}`;
        acao === 'copy' ? navigator.clipboard.writeText(texto) : downloadTxt('balanca.txt', texto);
        showStatus('status-balanca', 'Sucesso!');
    }

    function processarContato(acao) {
        const r = [1,2,3,4].map(i => document.getElementById('ram'+i).value.trim()).filter(x => x).join(", ");
        const texto = `--- TENTATIVA DE CONTATO ---\nCHAMADO: ${document.getElementById('chamado_cont').value}\nRAMAIS: ${r}\nSTATUS: Sem êxito.`;
        acao === 'copy' ? navigator.clipboard.writeText(texto) : downloadTxt('contato.txt', texto);
        showStatus('status-contato', 'Sucesso!');
    }

    function processarAtendimento(acao) {
        const texto = `PROBLEMA: ${document.getElementById('atend_prob').value}\nPROCEDIMENTO: ${document.getElementById('atend_proc').value}\nLOJA: ${document.getElementById('loja_atend').value}`;
        acao === 'copy' ? navigator.clipboard.writeText(texto) : downloadTxt('atendimento.txt', texto);
        showStatus('status-atend', 'Sucesso!');
    }

    function processarCaixa(acao) {
        const texto = `PROBLEMA: ${document.getElementById('prob_cx').value}\nPROCEDIMENTO: ${document.getElementById('proc_cx').value}\nLOJA: ${document.getElementById('loja_cx').value}`;
        acao === 'copy' ? navigator.clipboard.writeText(texto) : downloadTxt('caixa.txt', texto);
        showStatus('status-caixa', 'Sucesso!');
    }

    function toggleEquip() {
        document.getElementById('equipment-fields').style.display = document.getElementById('cat_atend').value === 'Equipamento' ? 'block' : 'none';
    }

    // ---------------- LÓGICA DA IA (O QUE VOCÊ PEDIU) ----------------
    async function melhorarTextoIA(campoId) {
        const token = document.getElementById('hf_token').value;
        const campo = document.getElementById(campoId);
        const statusId = campoId === 'atend_proc' ? 'status-atend' : 'status-caixa';

        if (!token) return alert("Insira o Token do Hugging Face no final da página!");
        if (!campo.value.trim()) return alert("Escreva o procedimento primeiro!");

        showStatus(statusId, "✨ IA Refinando seu texto...");
        campo.style.opacity = "0.5";

        try {
            const response = await fetch("https://router.huggingface.co/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "moonshotai/Kimi-K2-Instruct-0905",
                    messages: [{ role: "user", content: `Melhore tecnicamente para um chamado de TI (seja direto e profissional): ${campo.value}` }],
                    max_tokens: 300
                })
            });

            const data = await response.json();
            if (data.choices) {
                campo.value = data.choices[0].message.content.trim();
                showStatus(statusId, "✅ Texto atualizado pela IA!");
            }
        } catch (e) {
            alert("Erro na IA. Verifique o Token.");
        } finally {
            campo.style.opacity = "1";
        }
    }

    // Salvar token no navegador
    document.getElementById('hf_token').addEventListener('input', (e) => localStorage.setItem('my_hf_token', e.target.value));
    window.onload = () => { if(localStorage.getItem('my_hf_token')) document.getElementById('hf_token').value = localStorage.getItem('my_hf_token'); };
</script>

</body>
</html>
