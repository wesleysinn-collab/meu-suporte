<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Suporte TI - Oficial</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333333;
            --input-bg: #ffffff;
            --input-border: #dddddd;
            --success: #27ae60;
            --danger: #e74c3c;
            --whatsapp: #25d366;
        }

        [data-theme="dark"] {
            --primary: #ecf0f1;
            --bg: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #f5f5f5;
            --input-bg: #3d3d3d;
            --input-border: #444444;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
        
        .theme-switch { position: fixed; top: 15px; right: 15px; z-index: 100; }
        .theme-btn { background: var(--primary); color: var(--bg); border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .nav-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; background: #dcdde1; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: white; }

        .container { background: var(--container-bg); padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin: 0 auto; box-sizing: border-box; }
        h2 { color: var(--accent); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        
        input, select, textarea { 
            width: 100%; padding: 10px; border: 1px solid var(--input-border); 
            background: var(--input-bg); color: var(--text-color); border-radius: 4px; box-sizing: border-box; 
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        .action-btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; text-decoration: none; text-align: center; font-size: 14px; }
        .btn-copy { background: var(--accent); }
        .btn-whatsapp { background: var(--whatsapp); }
        .btn-clear { background: var(--danger); grid-column: span 2; }
        
        .status-msg { text-align: center; font-size: 0.9em; margin-top: 10px; height: 20px; color: var(--success); font-weight: bold; }
        #equipment-fields { display: none; background: rgba(0,0,0,0.05); padding: 15px; border-radius: 4px; margin-bottom: 15px; border: 1px dashed var(--accent); }
    </style>
</head>
<body>

<div class="theme-switch">
    <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle">🌙 Modo Escuro</button>
</div>

<div class="nav-container">
    <button class="nav-btn active" onclick="switchForm('mask3', this)">Registro de atendimento</button>
    <button class="nav-btn" onclick="switchForm('balanca', this)">Carga Balança</button>
</div>

<div id="mask3" class="form-content active">
    <div class="container">
        <h2>Registro de Atendimento</h2>
        <form id="registroForm">
            <div class="form-group"><label>Data/Hora:</label><input type="text" id="dataAtend" oninput="mascara(this, 'data')"></div>
            <div class="grid-2">
                <div class="form-group"><label>Solicitante:</label><input type="text" id="nome_atend"></div>
                <div class="form-group"><label>Loja/Setor:</label><input type="text" id="loja_atend"></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>WhatsApp/Tel:</label><input type="text" id="atend_tel1" oninput="mascara(this, 'tel')" placeholder="(00) 00000-0000"></div>
                <div class="form-group"><label>Categoria:</label>
                    <select id="cat_atend" onchange="toggleEquip()">
                        <option value="Sistema">Software</option>
                        <option value="Equipamento">Hardware</option>
                    </select>
                </div>
            </div>

            <div id="equipment-fields">
                <div class="grid-2">
                    <div class="form-group"><label>Equipamento:</label><input type="text" id="eq_nome"></div>
                    <div class="form-group"><label>Patrimônio:</label><input type="text" id="eq_pat" oninput="mascara(this, 'pat')"></div>
                </div>
            </div>

            <div class="form-group"><label>Problema:</label><textarea id="atend_prob"></textarea></div>
            <div class="form-group"><label>Procedimento:</label><textarea id="atend_proc"></textarea></div>

            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarAtendimento('copy')">Copiar Texto</button>
                <button type="button" class="action-btn btn-whatsapp" onclick="processarAtendimento('whatsapp')">Enviar WhatsApp</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('registroForm')">Limpar Tudo</button>
            </div>
            <div id="status-atend" class="status-msg"></div>
        </form>
    </div>
</div>

<script>
    // --- LÓGICA DE MÁSCARAS ---
    const lógicas = {
        tel: v => v.replace(/\D/g, '').replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d{5})(\d)/, '$1-$2').slice(0, 15),
        data: v => v.replace(/\D/g, '').replace(/(\d{2})(\d)/, '$1/$2').replace(/(\d{2})(\d)/, '$1/$2').replace(/(\d{4})(\d)/, '$1 $2').replace(/(\d{2})(\d)/, '$1:$2').slice(0, 16),
        pat: v => v.toUpperCase().replace(/[^A-Z0-9]/g, '').replace(/^([A-Z]{3})(\d)/, '$1-$2').slice(0, 10)
    };

    function mascara(i, t) { setTimeout(() => { i.value = lógicas[t](i.value); }, 1); }

    // --- LÓGICA DE TEMA ---
    function toggleTheme() {
        const t = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
        document.getElementById("theme-toggle").innerText = t === "dark" ? "☀️ Modo Claro" : "🌙 Modo Escuro";
    }
    if(localStorage.getItem("theme") === "dark") toggleTheme();

    // --- FUNÇÕES CORE ---
    function toggleEquip() { document.getElementById('equipment-fields').style.display = document.getElementById('cat_atend').value === 'Equipamento' ? 'block' : 'none'; }
    
    function setAtendData() { 
        const agora = new Date();
        const formatado = agora.toLocaleString('pt-BR').slice(0, 16);
        document.getElementById('dataAtend').value = formatado;
    }

    function processarAtendimento(acao) {
        const nome = document.getElementById('nome_atend').value;
        const loja = document.getElementById('loja_atend').value;
        const tel = document.getElementById('atend_tel1').value;
        const prob = document.getElementById('atend_prob').value;
        const proc = document.getElementById('atend_proc').value;
        
        const texto = `*REGISTRO DE ATENDIMENTO TI*\n\n` +
                      `*Solicitante:* ${nome} - ${loja}\n` +
                      `*Data:* ${document.getElementById('dataAtend').value}\n` +
                      `----------------------------\n` +
                      `*PROBLEMA:* ${prob}\n` +
                      `*SOLUÇÃO:* ${proc}\n` +
                      `----------------------------\n` +
                      `_Atendimento realizado pelo Portal de Suporte._`;

        if(acao === 'copy') {
            navigator.clipboard.writeText(texto);
            document.getElementById('status-atend').innerText = "Copiado com Formatação!";
            setTimeout(() => document.getElementById('status-atend').innerText = "", 2000);
        } else if(acao === 'whatsapp') {
            const numLimpo = tel.replace(/\D/g, '');
            if(numLimpo.length < 10) { alert("Digite um número de telefone válido"); return; }
            const link = `https://wa.me/55${numLimpo}?text=${encodeURIComponent(texto)}`;
            window.open(link, '_blank');
        }
    }

    function limpar(id) { if(confirm("Limpar?")) { document.getElementById(id).reset(); setAtendData(); } }
    
    window.onload = setAtendData;
</script>
</body>
</html>
