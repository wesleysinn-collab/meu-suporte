<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Suporte TI - Unificado</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        
        /* Navegação */
        .nav-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #dcdde1;
            font-weight: bold;
            transition: 0.3s;
            font-size: 13px;
        }
        .nav-btn.active { background: var(--accent); color: white; }

        /* Containers de Conteúdo */
        .form-content { display: none; animation: fadeIn 0.4s; }
        .form-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* PADRONIZAÇÃO DE LARGURA */
        .container { 
            background: #fff; 
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
            box-sizing: border-box;
        }

        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-family: inherit;
        }

        textarea { height: 80px; resize: vertical; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        button.action-btn { 
            padding: 12px; border: none; border-radius: 4px; cursor: pointer; 
            font-weight: bold; color: white; transition: 0.2s;
        }

        .btn-copy { background: var(--accent); }
        .btn-export { background: var(--success); }
        .btn-clear { background: var(--danger); grid-column: span 2; }
        
        .status-msg { text-align: center; font-size: 0.9em; margin-top: 10px; height: 20px; color: var(--success); font-weight: bold; }
        .required { color: var(--danger); }
        .fcr-highlight { border: 2px solid var(--success) !important; background-color: #f0fff4 !important; }
        
        #equipment-fields { display: none; background: #f9f9f9; padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px dashed #ccc; }
    </style>
</head>
<body>

<div class="nav-container">
    <button class="nav-btn active" onclick="switchForm('balanca', this)">Carga Balança</button>
    <button class="nav-btn" onclick="switchForm('mask2', this)">Tentativa de contato</button>
    <button class="nav-btn" onclick="switchForm('mask3', this)">Registro de atendimento</button>
    <button class="nav-btn" onclick="switchForm('mask4', this)">Atendimento de Caixa</button>
</div>

<div id="balanca" class="form-content active">
    <div class="container">
        <h2>Registro de Carga</h2>
        <form id="formBalanca">
            <div class="form-group"><label>Loja:</label><input type="text" id="loja_bal"></div>
            <div class="form-group"><label>Contato:</label><input type="text" id="contato_bal"></div>
            <div class="form-group"><label>Balança:</label><input type="text" id="balanca_id"></div>
            <div class="form-group">
                <label>Departamento:</label>
                <select id="depto_bal">
                    <option value="Açougue">Açougue</option>
                    <option value="Padaria">Padaria</option>
                    <option value="Hortifruti">Hortifruti</option>
                    <option value="Frios">Frios</option>
                </select>
            </div>
            <div class="form-group"><label>Motivo:</label><textarea id="motivo_bal"></textarea></div>
            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="copiarBalanca()">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="exportarBalanca()">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('formBalanca')">Limpar</button>
            </div>
            <div id="status-balanca" class="status-msg"></div>
        </form>
    </div>
</div>

<div id="mask2" class="form-content">
    <div class="container">
        <h2>Registro de Contato</h2>
        <form id="form2">
            <div class="form-group">
                <label>Número do Chamado <span class="required">*</span></label>
                <input type="text" id="chamado_cont" placeholder="Ex: 123456">
            </div>
            <div class="form-group">
                <label>Preciso falar com:</label>
                <input type="text" id="destinatario_cont" placeholder="Ex: Gerente">
            </div>
            <div class="form-group">
                <label>Ramais Utilizados <span class="required">*</span></label>
                <div class="grid-2">
                    <input type="text" id="ram1" placeholder="Ramal 1">
                    <input type="text" id="ram2" placeholder="Ramal 2">
                    <input type="text" id="ram3" placeholder="Ramal 3">
                    <input type="text" id="ram4" placeholder="Ramal 4">
                </div>
            </div>
            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarContato('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarContato('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('form2')">Limpar</button>
            </div>
            <div id="status-contato" class="status-msg"></div>
        </form>
    </div>
</div>

<div id="mask3" class="form-content">
    <div class="container">
        <h2>Registro de Atendimento</h2>
        <form id="registroForm">
            <div class="form-group"><label>Data e Hora:</label><input type="text" id="dataAtend" readonly style="background:#eee"></div>
            <div class="form-group">
                <label>Tipo:</label>
                <select id="tipoAtend" onchange="checkFCR()">
                    <option value="FCR - RESOLVIDO NA HORA">FCR - RESOLVIDO NA HORA</option>
                    <option value="CHAMADO ABERTO">CHAMADO ABERTO</option>
                </select>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Solicitante:</label><input type="text" id="nome_atend"></div>
                <div class="form-group"><label>Loja/Setor:</label><input type="text" id="loja_atend"></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Telefone 1:</label><input type="text" id="atend_tel1"></div>
                <div class="form-group"><label>Telefone 2:</label><input type="text" id="atend_tel2"></div>
            </div>
            <div class="form-group"><label>E-mail:</label><input type="text" id="atend_email"></div>
            <div class="form-group">
                <label>Categoria:</label>
                <select id="cat_atend" onchange="toggleEquip()">
                    <option value="Sistema">Sistema (Software)</option>
                    <option value="Equipamento">Equipamento (Hardware)</option>
                </select>
            </div>
            <div id="equipment-fields">
                <div class="form-group"><label>Equipamento:</label><input type="text" id="eq_nome"></div>
                <div class="form-group"><label>Patrimônio:</label><input type="text" id="eq_pat"></div>
            </div>
            <div class="form-group"><label>Problema Relatado:</label><textarea id="atend_prob"></textarea></div>
            <div class="form-group"><label>Procedimento Realizado:</label><textarea id="atend_proc"></textarea></div>
            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarAtendimento('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarAtendimento('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('registroForm')">Limpar</button>
            </div>
            <div id="status-atend" class="status-msg"></div>
        </form>
    </div>
</div>

<div id="mask4" class="form-content">
    <div class="container">
        <h2>Atendimento de Caixa</h2>
        <form id="formCaixa">
            <div class="form-group">
                <label>Tipo:</label>
                <input type="text" id="tipo_cx" value="Resolvido" readonly style="background:#eee">
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Solicitante:</label><input type="text" id="sol_cx" placeholder="Nome"></div>
                <div class="form-group"><label>Loja:</label><input type="text" id="loja_cx" placeholder="Nº Loja"></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Telefone:</label><input type="text" id="tel_cx" placeholder="(00) 00000-0000"></div>
                <div class="form-group"><label>Caixa Nº:</label><input type="text" id="num_cx" placeholder="Ex: 05"></div>
            </div>
            <div class="form-group"><label>Problema Relatado:</label><textarea id="prob_cx"></textarea></div>
            <div class="form-group"><label>Procedimento Executado:</label><textarea id="proc_cx"></textarea></div>
            <div class="btn-group">
                <button type="button" class="action-btn btn-copy" onclick="processarCaixa('copy')">Copiar</button>
                <button type="button" class="action-btn btn-export" onclick="processarCaixa('export')">Exportar</button>
                <button type="button" class="action-btn btn-clear" onclick="limpar('formCaixa')">Limpar</button>
            </div>
            <div id="status-caixa" class="status-msg"></div>
        </form>
    </div>
</div>

<script>
    // NAVEGAÇÃO
    function switchForm(id, btn) {
        document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'mask3') setAtendData();
    }

    function limpar(id) {
        if(confirm("Limpar campos?")) {
            document.getElementById(id).reset();
            if(id === 'registroForm') setAtendData();
        }
    }

    // LÓGICA BALANÇA
    function copiarBalanca() {
        const t = `--- CARGA BALANÇA ---\nLoja: ${document.getElementById('loja_bal').value}\nContato: ${document.getElementById('contato_bal').value}\nDepto: ${document.getElementById('depto_bal').value}\nMotivo: ${document.getElementById('motivo_bal').value}`;
        navigator.clipboard.writeText(t);
        showStatus('status-balanca', 'Copiado!');
    }

    // LÓGICA CONTATO
    function processarContato(acao) {
        const cham = document.getElementById('chamado_cont').value;
        const texto = `--- TENTATIVA DE CONTATO ---\nChamado: ${cham}\nDestinatário: ${document.getElementById('destinatario_cont').value}\nStatus: Sem êxito.`;
        if(acao === 'copy') navigator.clipboard.writeText(texto);
        showStatus('status-contato', 'Sucesso!');
    }

    // LÓGICA ATENDIMENTO
    function setAtendData() { document.getElementById('dataAtend').value = new Date().toLocaleString(); }
    function toggleEquip() { document.getElementById('equipment-fields').style.display = document.getElementById('cat_atend').value === 'Equipamento' ? 'block' : 'none'; }
    function checkFCR() { document.getElementById('atend_proc').classList.toggle('fcr-highlight', document.getElementById('tipoAtend').value.includes('FCR')); }
    
    function processarAtendimento(acao) {
        const texto = `==================================\nPROBLEMA: ${document.getElementById('atend_prob').value}\nPROCEDIMENTO: ${document.getElementById('atend_proc').value}\n==================================\nSOLICITANTE: ${document.getElementById('nome_atend').value}\nLOJA: ${document.getElementById('loja_atend').value}\n==================================`;
        if(acao === 'copy') navigator.clipboard.writeText(texto);
        showStatus('status-atend', 'Copiado!');
    }

    // LÓGICA CAIXA (NOVA MÁSCARA)
    function processarCaixa(acao) {
        const texto = `DATA/HORA: ${new Date().toLocaleString('pt-BR')}
TIPO: ${document.getElementById('tipo_cx').value}
-----------------------------------
PROBLEMA RELATADO:
${document.getElementById('prob_cx').value}

PROCEDIMENTO EXECUTADO:
${document.getElementById('proc_cx').value}
-----------------------------------

SOLICITANTE: ${document.getElementById('sol_cx').value}
LOJA: ${document.getElementById('loja_cx').value}
TELEFONE: ${document.getElementById('tel_cx').value}
CAIXA Nº: ${document.getElementById('num_cx').value}
-----------------------------------`;

        if(acao === 'copy') {
            navigator.clipboard.writeText(texto);
            showStatus('status-caixa', 'Copiado!');
        } else {
            const blob = new Blob([texto], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `atendimento_caixa.txt`;
            link.click();
            showStatus('status-caixa', 'Exportado!');
        }
    }

    function showStatus(id, msg) {
        const el = document.getElementById(id);
        el.innerText = msg;
        setTimeout(() => el.innerText = '', 2000);
    }

    window.onload = setAtendData;
</script>
</body>
</html>
